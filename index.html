<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiard Pro - Pro Manager Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05080f; color: white; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .active-table { border-top: 4px solid #3b82f6; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="playerModal" class="modal p-4">
        <div class="glass p-6 rounded-3xl w-full max-w-md border border-white/10">
            <h3 class="font-black text-yellow-500 mb-4 uppercase tracking-widest">Pilih Pemain Manual</h3>
            <div id="modalPlayerList" class="grid grid-cols-1 gap-2 max-h-80 overflow-y-auto pr-2"></div>
            <button onclick="closeModal()" class="w-full mt-6 py-3 rounded-xl bg-white/5 font-bold uppercase text-[10px]">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://appturnamen-51b2e-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center glass p-5 rounded-2xl border border-white/5">
            <div>
                <h1 class="text-xl font-black font-digital text-yellow-500 tracking-tighter uppercase">🎱 Pro Manager</h1>
                <p class="text-[8px] text-slate-500 tracking-[0.3em] font-bold">MANUAL SELECTION & EDIT MODE</p>
            </div>
            <button onclick="clearAllData()" class="text-[10px] bg-rose-600/20 text-rose-500 border border-rose-500/30 px-4 py-2 rounded-full font-black uppercase">Reset</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="glass p-5 rounded-2xl">
                    <input type="text" id="pName" placeholder="Nama Pemain..." class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl mb-3 outline-none focus:border-yellow-500 text-sm font-bold">
                    <button onclick="addPlayerOnline()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl shadow-lg shadow-yellow-500/20">DAFTARKAN</button>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl">
                        <p class="text-[10px] font-black text-blue-400 mb-3 uppercase tracking-widest">Kontrol Meja 1</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="shuffleByTable(1)" class="bg-blue-600 py-2 rounded-lg font-black text-[9px] uppercase">🎲 Acak</button>
                            <button onclick="openManualSelect(1)" class="bg-white/10 py-2 rounded-lg font-black text-[9px] uppercase border border-white/10">👤 Manual</button>
                        </div>
                    </div>
                    <div class="bg-rose-600/10 border border-rose-500/20 p-4 rounded-2xl">
                        <p class="text-[10px] font-black text-rose-400 mb-3 uppercase tracking-widest">Kontrol Meja 2</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="shuffleByTable(2)" class="bg-rose-600 py-2 rounded-lg font-black text-[9px] uppercase">🎲 Acak</button>
                            <button onclick="openManualSelect(2)" class="bg-white/10 py-2 rounded-lg font-black text-[9px] uppercase border border-white/10">👤 Manual</button>
                        </div>
                    </div>
                </div>
                <div id="playerList" class="space-y-1.5 max-h-40 overflow-y-auto pr-2"></div>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="card_t1" class="glass p-6 rounded-[2rem] border border-white/5">
                        <div class="flex justify-between items-center mb-4 text-[10px] font-black">
                            <span class="text-blue-400">TABLE 01</span>
                            <div id="t1_timer" class="font-digital text-yellow-500">00:00:00</div>
                        </div>
                        <div class="flex justify-between items-center text-center gap-4 mb-6">
                            <div class="flex-1">
                                <p id="t1_p1" class="text-[10px] font-black text-blue-400 uppercase truncate">Player 1</p>
                                <div id="t1_s1" class="text-5xl font-digital my-2">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t1_s1', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t1_s1', 1)" class="flex-[2] bg-blue-600 py-1 rounded">+</button></div>
                            </div>
                            <div class="text-slate-800 font-black italic">VS</div>
                            <div class="flex-1">
                                <p id="t1_p2" class="text-[10px] font-black text-red-400 uppercase truncate">Player 2</p>
                                <div id="t1_s2" class="text-5xl font-digital my-2">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t1_s2', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t1_s2', 1)" class="flex-[2] bg-red-600 py-1 rounded">+</button></div>
                            </div>
                        </div>
                        <button onclick="saveMatchOnline(1)" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-emerald-900/20">Simpan Skor</button>
                    </div>

                    <div id="card_t2" class="glass p-6 rounded-[2rem] border border-white/5">
                        <div class="flex justify-between items-center mb-4 text-[10px] font-black">
                            <span class="text-rose-400">TABLE 02</span>
                            <div id="t2_timer" class="font-digital text-yellow-500">00:00:00</div>
                        </div>
                        <div class="flex justify-between items-center text-center gap-4 mb-6">
                            <div class="flex-1">
                                <p id="t2_p1" class="text-[10px] font-black text-blue-400 uppercase truncate">Player 1</p>
                                <div id="t2_s1" class="text-5xl font-digital my-2">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t2_s1', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t2_s1', 1)" class="flex-[2] bg-blue-600 py-1 rounded">+</button></div>
                            </div>
                            <div class="text-slate-800 font-black italic">VS</div>
                            <div class="flex-1">
                                <p id="t2_p2" class="text-[10px] font-black text-red-400 uppercase truncate">Player 2</p>
                                <div id="t2_s2" class="text-5xl font-digital my-2">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t2_s2', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t2_s2', 1)" class="flex-[2] bg-red-600 py-1 rounded">+</button></div>
                            </div>
                        </div>
                        <button onclick="saveMatchOnline(2)" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-emerald-900/20">Simpan Skor</button>
                    </div>
                </div>

                <div id="share-area" class="p-6 glass rounded-3xl border border-white/10">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xs font-black text-yellow-500 uppercase tracking-widest">🏆 Leaderboard</h2>
                        <button onclick="downloadKlasemen()" class="text-[8px] bg-white/5 px-3 py-1 rounded-full uppercase border border-white/10">Cetak Gambar</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead class="text-slate-500 uppercase text-[8px] border-b border-white/5">
                                <tr><th class="p-4">Rank</th><th class="p-4">Nama</th><th class="p-4 text-center">P</th><th class="p-4 text-center">W</th><th class="p-4 text-center text-yellow-500">PTS</th></tr>
                            </thead>
                            <tbody id="rankTable" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden border border-white/5">
                    <div class="p-4 bg-white/5 border-b border-white/5 font-black text-blue-400 text-[10px] uppercase tracking-widest">Riwayat Pertandingan (Bisa Hapus/Edit)</div>
                    <div id="historyList" class="p-4 space-y-2 max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let local_players = [];
        let local_history = [];
        let currentTargetTable = 1;
        let selectedP1 = null;

        db.ref('tournament_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                local_players = data.players || [];
                local_history = data.history || [];
                renderAll();
            }
        });

        // FUNGSI DASAR
        function addPlayerOnline() {
            const name = document.getElementById('pName').value.trim().toUpperCase();
            if(!name || local_players.find(p => p.name === name)) return;
            local_players.push({ name, p:0, w:0, l:0, pts:0 });
            db.ref('tournament_data/players').set(local_players);
            document.getElementById('pName').value = "";
        }

        function adjustScore(id, val) {
            const el = document.getElementById(id);
            let score = parseInt(el.innerText) + val;
            if(score < 0) score = 0;
            el.innerText = score;
        }

        // FUNGSI PILIH MANUAL
        function openManualSelect(table) {
            currentTargetTable = table;
            selectedP1 = null;
            renderModalPlayers();
            document.getElementById('playerModal').style.display = 'flex';
        }

        function renderModalPlayers() {
            const list = document.getElementById('modalPlayerList');
            // Ambil nama yang sedang bertanding di meja lain
            let other = currentTargetTable === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];

            list.innerHTML = local_players
                .filter(p => !busy.includes(p.name))
                .map(p => `
                    <button onclick="selectPlayer('${p.name}')" class="w-full p-4 bg-white/5 rounded-xl text-left hover:bg-yellow-500 hover:text-black transition flex justify-between items-center">
                        <span class="font-black">${p.name}</span>
                        <span class="text-[8px] opacity-60">P: ${p.p} | PTS: ${p.pts}</span>
                    </button>
                `).join('');
        }

        function selectPlayer(name) {
            if(!selectedP1) {
                selectedP1 = name;
                // Ubah tampilan modal untuk pilih pemain kedua
                document.querySelector('#playerModal h3').innerText = "Pilih Lawan untuk " + name;
                renderModalPlayers(); // Refresh list agar nama pertama tidak muncul lagi
                // Sembunyikan nama yang baru saja dipilih
                const btns = document.querySelectorAll('#modalPlayerList button');
                btns.forEach(b => { if(b.innerText.includes(name)) b.style.display = 'none'; });
            } else {
                document.getElementById(`t${currentTargetTable}_p1`).innerText = selectedP1;
                document.getElementById(`t${currentTargetTable}_p2`).innerText = name;
                document.getElementById(`t${currentTargetTable}_s1`).innerText = "0";
                document.getElementById(`t${currentTargetTable}_s2`).innerText = "0";
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
            document.querySelector('#playerModal h3').innerText = "Pilih Pemain Manual";
        }

        // ACAK OTOMATIS (Prioritas Rataan)
        function shuffleByTable(table) {
            let other = table === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];
            
            let pairs = [];
            for(let i=0; i<local_players.length; i++){
                for(let j=i+1; j<local_players.length; j++){
                    let n1 = local_players[i].name, n2 = local_players[j].name;
                    if(busy.includes(n1) || busy.includes(n2)) continue;
                    let played = local_history.some(h => (h.p1===n1 && h.p2===n2) || (h.p1===n2 && h.p2===n1));
                    if(!played) pairs.push({ pair:[local_players[i], local_players[j]], sum: local_players[i].p + local_players[j].p });
                }
            }
            if(pairs.length === 0) return alert("Semua sudah tanding atau pemain tidak cukup!");
            pairs.sort((a,b) => a.sum - b.sum);
            let chosen = pairs[0].pair;
            document.getElementById(`t${table}_p1`).innerText = chosen[0].name;
            document.getElementById(`t${table}_p2`).innerText = chosen[1].name;
            document.getElementById(`t${table}_s1`).innerText = "0";
            document.getElementById(`t${table}_s2`).innerText = "0";
        }

        // SIMPAN & HAPUS (EDIT)
        function saveMatchOnline(table) {
            const p1n = document.getElementById(`t${table}_p1`).innerText;
            const p2n = document.getElementById(`t${table}_p2`).innerText;
            const s1 = parseInt(document.getElementById(`t${table}_s1`).innerText);
            const s2 = parseInt(document.getElementById(`t${table}_s2`).innerText);
            if(p1n.includes("PLAYER") || s1 === s2) return alert("Cek kembali skor/pemain!");

            let p1 = local_players.find(p => p.name === p1n);
            let p2 = local_players.find(p => p.name === p2n);

            p1.p++; p2.p++;
            if(s1 > s2) { p1.w++; p1.pts += 1; p2.l++; } 
            else { p2.w++; p2.pts += 1; p1.l++; }

            const matchID = Date.now();
            local_history.unshift({ id: matchID, p1: p1n, p2: p2n, s1, s2, winner: (s1>s2?p1n:p2n) });
            db.ref('tournament_data').update({ players: local_players, history: local_history });

            // Reset UI
            document.getElementById(`t${table}_p1`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_p2`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_s1`).innerText = "0"; document.getElementById(`t${table}_s2`).innerText = "0";
        }

        function deleteMatch(matchID) {
            if(!confirm("Hapus pertandingan ini? Poin pemain akan dikembalikan.")) return;
            
            const match = local_history.find(h => h.id === matchID);
            if(!match) return;

            let p1 = local_players.find(p => p.name === match.p1);
            let p2 = local_players.find(p => p.name === match.p2);

            // Balikkan statistik
            p1.p--; p2.p--;
            if(match.s1 > match.s2) { p1.w--; p1.pts -= 1; p2.l--; }
            else { p2.w--; p2.pts -= 1; p1.l--; }

            const newHistory = local_history.filter(h => h.id !== matchID);
            db.ref('tournament_data').update({ players: local_players, history: newHistory });
        }

        function renderAll() {
            const sorted = [...local_players].sort((a,b) => b.pts - a.pts || b.w - a.w || a.l - b.l);
            document.getElementById('rankTable').innerHTML = sorted.map((p,i) => `
                <tr class="border-b border-white/5 ${i < 2 ? 'bg-white/5' : ''}">
                    <td class="p-4 font-digital ${i<2?'text-yellow-500':'text-slate-500'}">${i+1}</td>
                    <td class="p-4 font-black uppercase">${p.name}</td>
                    <td class="p-4 text-center text-slate-400">${p.p}</td>
                    <td class="p-4 text-center text-emerald-400 font-bold">${p.w}</td>
                    <td class="p-4 text-center font-digital font-bold text-yellow-500 text-lg">${p.pts}</td>
                </tr>
            `).join('');

            document.getElementById('playerList').innerHTML = local_players.map(p => `
                <div class="bg-slate-900/50 p-2 rounded-lg text-[9px] flex justify-between border border-white/5 uppercase">
                    <span>${p.name}</span><span class="text-yellow-500">${p.pts} PTS</span>
                </div>
            `).join('');

            document.getElementById('historyList').innerHTML = local_history.map(h => `
                <div class="bg-black/40 p-3 rounded-xl border border-white/5 flex justify-between items-center group">
                    <div class="text-[10px] uppercase font-bold tracking-tight">
                        <span class="${h.s1 > h.s2 ? 'text-yellow-500' : ''}">${h.p1}</span>
                        <span class="mx-2 text-slate-600">${h.s1}-${h.s2}</span>
                        <span class="${h.s2 > h.s1 ? 'text-yellow-500' : ''}">${h.p2}</span>
                    </div>
                    <button onclick="deleteMatch(${h.id})" class="text-[8px] bg-rose-600/20 text-rose-500 px-2 py-1 rounded-lg opacity-0 group-hover:opacity-100 transition font-black">HAPUS</button>
                </div>
            `).join('');
        }

        function downloadKlasemen() {
            html2canvas(document.getElementById('share-area'), { backgroundColor: "#05080f", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Klasemen_Billiard.jpg';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function clearAllData() { if(confirm("Hapus semua?")) db.ref('tournament_data').remove(); }
    </script>
</body>
</html>
