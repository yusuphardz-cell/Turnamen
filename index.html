<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJK Premium Dashboard - Live Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 9999; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="mainModal" class="modal-overlay">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg mx-4">
            <h3 id="modalTitle" class="text-xl font-extrabold text-white uppercase text-center mb-6 italic tracking-tighter">Detail</h3>
            <div id="modalContent" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
            <button onclick="closeModal()" class="w-full mt-6 py-4 rounded-xl bg-white/5 text-slate-400 font-bold uppercase text-[10px] tracking-widest border border-white/10 hover:bg-white/20">Tutup</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col md:flex-row justify-between items-center bg-white/5 border border-white/10 p-8 rounded-[2.5rem] gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter text-white italic uppercase">BJK <span class="text-amber-500">Community</span></h1>
                <p class="text-[10px] text-slate-500 font-mono uppercase tracking-[0.4em] mt-1">Tournament System v7.5</p>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadKlasemen()" class="px-6 py-3 rounded-2xl bg-blue-500/10 text-blue-400 font-bold text-[10px] uppercase border border-blue-500/20 hover:bg-blue-500 hover:text-white transition-all">Capture</button>
                <button onclick="resetTournamentData()" class="px-6 py-3 rounded-2xl bg-rose-500/10 text-rose-500 font-bold text-[10px] uppercase border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">Reset Data</button>
            </div>
        </header>

        <main class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-6">Pendaftaran Peserta</h2>
                    <input type="text" id="pName" placeholder="Nama Pemain..." class="w-full p-5 bg-slate-900 border border-white/5 rounded-2xl outline-none focus:border-amber-500 text-white font-bold uppercase mb-4 transition-all">
                    <button onclick="addPlayerOnline()" class="w-full bg-amber-500 text-black font-extrabold py-5 rounded-2xl text-[11px] uppercase tracking-widest active:scale-95 transition-all">Simpan Nama</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-[2rem] text-center border-b-2 border-blue-500/50">
                        <span class="text-[9px] font-bold text-slate-500 uppercase mb-3 block italic">Meja 1</span>
                        <div class="flex flex-col gap-2">
                            <button onclick="shuffleByTable(1)" class="bg-blue-500/10 text-blue-400 py-3 rounded-xl font-bold text-[9px] uppercase border border-blue-500/10">Acak</button>
                            <button onclick="openManualSelect(1)" class="bg-white/5 text-white py-3 rounded-xl font-bold text-[9px] uppercase">Pilih</button>
                        </div>
                    </div>
                    <div class="glass p-5 rounded-[2rem] text-center border-b-2 border-rose-500/50">
                        <span class="text-[9px] font-bold text-slate-500 uppercase mb-3 block italic">Meja 2</span>
                        <div class="flex flex-col gap-2">
                            <button onclick="shuffleByTable(2)" class="bg-rose-500/10 text-rose-400 py-3 rounded-xl font-bold text-[9px] uppercase border border-rose-500/10">Acak</button>
                            <button onclick="openManualSelect(2)" class="bg-white/5 text-white py-3 rounded-xl font-bold text-[9px] uppercase">Pilih</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[3rem]">
                        <div class="flex justify-between items-center mb-6"><span class="bg-blue-600 text-white px-4 py-1 rounded-full text-[8px] font-bold uppercase">Meja 1</span></div>
                        <div class="flex justify-between items-center text-center gap-2 mb-6">
                            <div class="flex-1"><p id="t1_p1" class="text-[10px] font-bold uppercase mb-2 truncate">PLAYER 1</p><div id="t1_s1" class="text-6xl font-mono font-bold mb-4">0</div><div class="flex gap-1"><button onclick="adjustScore('t1_s1', -1)" class="w-8 h-8 bg-white/5 rounded-lg">-</button><button onclick="adjustScore('t1_s1', 1)" class="flex-1 h-8 bg-blue-500/20 rounded-lg">+</button></div></div>
                            <div class="text-slate-800 italic font-black text-xs">VS</div>
                            <div class="flex-1"><p id="t1_p2" class="text-[10px] font-bold uppercase mb-2 truncate">PLAYER 2</p><div id="t1_s2" class="text-6xl font-mono font-bold mb-4">0</div><div class="flex gap-1"><button onclick="adjustScore('t1_s2', -1)" class="w-8 h-8 bg-white/5 rounded-lg">-</button><button onclick="adjustScore('t1_s2', 1)" class="flex-1 h-8 bg-rose-500/20 rounded-lg">+</button></div></div>
                        </div>
                        <button onclick="saveMatchOnline(1)" class="w-full py-4 bg-emerald-500 text-black font-extrabold rounded-xl text-[10px] uppercase tracking-widest">Simpan Skor</button>
                    </div>
                    <div class="glass p-8 rounded-[3rem]">
                        <div class="flex justify-between items-center mb-6"><span class="bg-rose-600 text-white px-4 py-1 rounded-full text-[8px] font-bold uppercase">Meja 2</span></div>
                        <div class="flex justify-between items-center text-center gap-2 mb-6">
                            <div class="flex-1"><p id="t2_p1" class="text-[10px] font-bold uppercase mb-2 truncate">PLAYER 1</p><div id="t2_s1" class="text-6xl font-mono font-bold mb-4">0</div><div class="flex gap-1"><button onclick="adjustScore('t2_s1', -1)" class="w-8 h-8 bg-white/5 rounded-lg">-</button><button onclick="adjustScore('t2_s1', 1)" class="flex-1 h-8 bg-blue-500/20 rounded-lg">+</button></div></div>
                            <div class="text-slate-800 italic font-black text-xs">VS</div>
                            <div class="flex-1"><p id="t2_p2" class="text-[10px] font-bold uppercase mb-2 truncate">PLAYER 2</p><div id="t2_s2" class="text-6xl font-mono font-bold mb-4">0</div><div class="flex gap-1"><button onclick="adjustScore('t2_s2', -1)" class="w-8 h-8 bg-white/5 rounded-lg">-</button><button onclick="adjustScore('t2_s2', 1)" class="flex-1 h-8 bg-rose-500/20 rounded-lg">+</button></div></div>
                        </div>
                        <button onclick="saveMatchOnline(2)" class="w-full py-4 bg-emerald-500 text-black font-extrabold rounded-xl text-[10px] uppercase tracking-widest">Simpan Skor</button>
                    </div>
                </div>

                <div id="share-area" class="glass p-8 rounded-[2.5rem]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold italic uppercase tracking-tighter">Klasemen Sementara</h2>
                        <span class="text-[9px] text-slate-500 uppercase font-mono">BJK Community</span>
                    </div>
                    <table class="w-full text-left">
                        <thead class="text-[9px] text-slate-500 uppercase tracking-widest border-b border-white/5">
                            <tr><th class="p-4">#</th><th class="p-4">Nama</th><th class="p-4 text-center">W</th><th class="p-4 text-center">Pts</th></tr>
                        </thead>
                        <tbody id="rankTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ISI DENGAN KREDENSIAL SUPABASE ANDA
        const SUPABASE_URL = "xdgjjsdvrcqwwlmrxcpm"
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ2pqc2R2cmNxd3dsbXJ4Y3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk4MjAsImV4cCI6MjA5MDQwNTgyMH0.4dPYAZRrdd4RyPT4UU-jcpGglIr65Av9eUvKwLWOqKs"
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let local_players = [];
        let local_history = [];
        let currentTargetTable = 1;
        let selectedP1 = null;

        async function loadData() {
            try {
                const { data: p } = await _supabase.from('players').select('*').order('pts', { ascending: false }).order('w', { ascending: false });
                const { data: h } = await _supabase.from('history').select('*');
                local_players = p || [];
                local_history = h || [];
                renderAll();
            } catch (e) { console.error("Gagal sinkronisasi data:", e); }
        }

        // TAMBAH PEMAIN + VALIDASI PESAN ERROR
        async function addPlayerOnline() {
            const inp = document.getElementById('pName');
            const name = inp.value.trim().toUpperCase();
            if (!name) return alert("Ketikkan nama pemain terlebih dahulu!");

            try {
                const { error } = await _supabase
                    .from('players')
                    .insert([{ name, p: 0, w: 0, l: 0, pts: 0 }]);

                if (error) throw error;
                inp.value = ""; // Bersihkan kolom input jika berhasil
            } catch (err) {
                console.error(err);
                alert(`Gagal menambah pemain!\nAlasan: ${err.message || 'Periksa koneksi internet atau RLS Policy tabel players.'}`);
            }
        }

        // RESET AMAN DAN AMAN DARI ERROR URL PATH
        async function resetTournamentData() {
            if (!confirm("⚠️ PERINGATAN KERAS!\nHapus permanen semua data pemain dan riwayat pertandingan?")) return;

            try {
                // Sintaks filter '.not('is', null)' mencegah pembentukan URL path yang korup/invalid
                const { error: eh } = await _supabase.from('history').delete().not('p1', 'is', null);
                const { error: ep } = await _supabase.from('players').delete().not('name', 'is', null);

                if (eh || ep) throw (eh || ep);

                alert("✅ Database turnamen berhasil dikosongkan!");
                location.reload(); // Refresh total untuk menyegarkan state UI
            } catch (err) {
                console.error(err);
                alert(`Gagal Reset!\nAlasan: ${err.message || 'Pastikan RLS untuk operasi DELETE sudah diaktifkan.'}`);
            }
        }

        // PELACAKAN RIWAYAT LAWAN TANDING
        function checkOpponents(playerName) {
            const modal = document.getElementById('mainModal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTitle').innerText = "Riwayat: " + playerName;

            const played = [];
            local_history.forEach(m => {
                if(m.p1 === playerName) played.push(m.p2);
                if(m.p2 === playerName) played.push(m.p1);
            });

            const others = local_players.filter(p => p.name !== playerName);
            
            content.innerHTML = `
                <div class="mb-4 bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/20">
                    <p class="text-[10px] text-emerald-500 font-bold uppercase mb-2">Sudah Lawan:</p>
                    <div class="flex flex-wrap gap-1">
                        ${[...new Set(played)].map(n => `<span class="bg-emerald-500 text-black text-[9px] px-2 py-0.5 rounded font-bold uppercase">${n}</span>`).join('') || '<span class="text-slate-500 text-[10px]">Belum bermain</span>'}
                    </div>
                </div>
                <div class="bg-rose-500/10 p-5 rounded-2xl border border-rose-500/20">
                    <p class="text-[10px] text-rose-500 font-bold uppercase mb-2">Belum Lawan:</p>
                    <div class="flex flex-wrap gap-1">
                        ${others.filter(o => !played.includes(o.name)).map(o => `<span class="bg-rose-500 text-white text-[9px] px-2 py-0.5 rounded font-bold uppercase">${o.name}</span>`).join('') || '<span class="text-emerald-500 text-[10px]">Semua sudah dilawan</span>'}
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        // MATCHMAKING SELEKSI MANUAL
        function openManualSelect(table) {
            currentTargetTable = table;
            selectedP1 = null;
            document.getElementById('modalTitle').innerText = "Pilih P1 - Meja " + table;
            renderSelection();
            document.getElementById('mainModal').style.display = 'flex';
        }

        function renderSelection() {
            const other = currentTargetTable === 1 ? 2 : 1;
            const busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText, selectedP1];
            const av = local_players.filter(p => !busy.includes(p.name));
            document.getElementById('modalContent').innerHTML = av.map(p => `
                <button onclick="handleSelect('${p.name}')" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-left hover:bg-amber-500 hover:text-black font-bold uppercase text-xs transition-all">${p.name}</button>
            `).join('') || '<p class="text-center text-slate-500 py-4 text-xs italic">Tidak ada pemain luang</p>';
        }

        function handleSelect(name) {
            if (!selectedP1) {
                selectedP1 = name;
                document.getElementById(`t${currentTargetTable}_p1`).innerText = name;
                document.getElementById('modalTitle').innerText = "Lawan untuk " + name;
                renderSelection();
            } else {
                document.getElementById(`t${currentTargetTable}_p2`).innerText = name;
                closeModal();
            }
        }

        function closeModal() { document.getElementById('mainModal').style.display = 'none'; }

        // RENDER KLASEMEN
        function renderAll() {
            document.getElementById('rankTable').innerHTML = local_players.map((p, i) => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-mono text-slate-600 text-xs">${i+1}</td>
                    <td class="p-4"><button onclick="checkOpponents('${p.name}')" class="font-bold uppercase text-sm hover:text-amber-500 text-left">${p.name}</button></td>
                    <td class="p-4 text-center text-emerald-500 font-mono text-xs">${p.w}</td>
                    <td class="p-4 text-center text-amber-500 font-bold text-lg">${p.pts}</td>
                </tr>
            `).join('');
        }

        // SIMPAN RIWAYAT SKOR
        async function saveMatchOnline(t) {
            const p1n = document.getElementById(`t${t}_p1`).innerText;
            const p2n = document.getElementById(`t${t}_p2`).innerText;
            const s1 = parseInt(document.getElementById(`t${t}_s1`).innerText);
            const s2 = parseInt(document.getElementById(`t${t}_s2`).innerText);
            if(p1n.includes("PLAYER") || s1 === s2) return alert("Pilih pemain dan tentukan skor pemenang (tidak boleh seri)!");

            const p1 = local_players.find(x => x.name === p1n);
            const p2 = local_players.find(x => x.name === p2n);

            try {
                await _supabase.from('history').insert([{ p1: p1n, p2: p2n, s1, s2 }]);
                await _supabase.from('players').update({ p: p1.p+1, w: s1>s2?p1.w+1:p1.w, pts: s1>s2?p1.pts+1:p1.pts }).eq('name', p1n);
                await _supabase.from('players').update({ p: p2.p+1, w: s2>s1?p2.w+1:p2.w, pts: s2>s1?p2.pts+1:p2.pts }).eq('name', p2n);

                ["p1","p2"].forEach(x => document.getElementById(`t${t}_${x}`).innerText = "PLAYER");
                ["s1","s2"].forEach(x => document.getElementById(`t${t}_${x}`).innerText = "0");
            } catch (err) { alert("Gagal menyimpan skor: " + err.message); }
        }

        function shuffleByTable(t) {
            const other = t === 1 ? 2 : 1;
            const busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];
            const av = local_players.filter(p => !busy.includes(p.name)).sort(() => Math.random() - 0.5);
            if(av.length < 2) return alert("Jumlah pemain yang tersedia kurang untuk diacak!");
            document.getElementById(`t${t}_p1`).innerText = av[0].name;
            document.getElementById(`t${t}_p2`).innerText = av[1].name;
        }

        function adjustScore(id, v) { let e = document.getElementById(id); e.innerText = Math.max(0, parseInt(e.innerText) + v); }

        function downloadKlasemen() {
            html2canvas(document.getElementById('share-area'), { backgroundColor: "#020617" }).then(c => {
                let l = document.createElement('a'); l.download = 'BJK-Standings.jpg'; l.href = c.toDataURL(); l.click();
            });
        }

        // REALTIME SYNCHRONIZATION
        _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'history' }, loadData).subscribe();
        
        loadData();
    </script>
</body>
</html>
