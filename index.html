<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiard Pro - Smart Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05080f; color: white; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .active-table { border: 2px solid #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="playerModal" class="modal p-4">
        <div class="glass p-6 rounded-3xl w-full max-w-md border border-white/10">
            <h3 class="font-black text-yellow-500 mb-4 uppercase tracking-widest text-center">Pilih Pemain Manual</h3>
            <div id="modalPlayerList" class="grid grid-cols-1 gap-2 max-h-80 overflow-y-auto pr-2"></div>
            <button onclick="closeModal()" class="w-full mt-6 py-3 rounded-xl bg-white/5 font-bold uppercase text-[10px]">Batal / Tutup</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center glass p-5 rounded-2xl">
            <div>
                <h1 class="text-xl font-black font-digital text-yellow-500 tracking-tighter uppercase">🎱 Pro Tournament</h1>
                <p class="text-[8px] text-slate-500 tracking-[0.3em] font-bold uppercase">Smart Random & Fair Play System</p>
            </div>
            <button onclick="clearAllData()" class="text-[10px] bg-rose-600/20 text-rose-500 border border-rose-500/30 px-4 py-2 rounded-full font-black uppercase">Reset Data</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="glass p-5 rounded-2xl">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-3 tracking-widest text-center">Registrasi Peserta</p>
                    <input type="text" id="pName" placeholder="Nama..." class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl mb-3 outline-none focus:border-yellow-500 text-sm font-bold">
                    <button onclick="addPlayerOnline()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl transition active:scale-95 shadow-lg shadow-yellow-500/20">DAFTARKAN</button>
                </div>
                
                <div class="space-y-3">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl text-center">
                        <p class="text-[9px] font-black text-blue-400 mb-3 uppercase">Meja 1</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="shuffleByTable(1)" class="bg-blue-600 py-2 rounded-lg font-black text-[9px] uppercase">🎲 Acak</button>
                            <button onclick="openManualSelect(1)" class="bg-white/10 py-2 rounded-lg font-black text-[9px] uppercase border border-white/5">👤 Manual</button>
                        </div>
                    </div>
                    <div class="bg-rose-600/10 border border-rose-500/20 p-4 rounded-2xl text-center">
                        <p class="text-[9px] font-black text-rose-400 mb-3 uppercase">Meja 2</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="shuffleByTable(2)" class="bg-rose-600 py-2 rounded-lg font-black text-[9px] uppercase">🎲 Acak</button>
                            <button onclick="openManualSelect(2)" class="bg-white/10 py-2 rounded-lg font-black text-[9px] uppercase border border-white/5">👤 Manual</button>
                        </div>
                    </div>
                </div>
                <div id="playerList" class="space-y-1 max-h-40 overflow-y-auto pr-2"></div>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="card_t1" class="glass p-6 rounded-[2rem] border border-white/5">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full uppercase">Table 01</span>
                            <div class="text-xs font-digital text-yellow-500" id="t1_timer">LIVE</div>
                        </div>
                        <div class="flex justify-between items-center text-center gap-2 mb-8">
                            <div class="flex-1">
                                <p id="t1_p1" class="text-[10px] font-black text-blue-400 uppercase truncate">Player 1</p>
                                <div id="t1_s1" class="text-6xl font-digital my-2 text-white">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t1_s1', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t1_s1', 1)" class="flex-[2] bg-blue-600 py-1 rounded">+</button></div>
                            </div>
                            <div class="text-slate-800 font-black italic">VS</div>
                            <div class="flex-1">
                                <p id="t1_p2" class="text-[10px] font-black text-red-400 uppercase truncate">Player 2</p>
                                <div id="t1_s2" class="text-6xl font-digital my-2 text-white">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t1_s2', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t1_s2', 1)" class="flex-[2] bg-red-600 py-1 rounded">+</button></div>
                            </div>
                        </div>
                        <button onclick="saveMatchOnline(1)" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-emerald-900/20">Simpan Pertandingan</button>
                    </div>

                    <div id="card_t2" class="glass p-6 rounded-[2rem] border border-white/5">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black bg-rose-600/20 text-rose-400 px-3 py-1 rounded-full uppercase">Table 02</span>
                            <div class="text-xs font-digital text-yellow-500" id="t2_timer">LIVE</div>
                        </div>
                        <div class="flex justify-between items-center text-center gap-2 mb-8">
                            <div class="flex-1">
                                <p id="t2_p1" class="text-[10px] font-black text-blue-400 uppercase truncate">Player 1</p>
                                <div id="t2_s1" class="text-6xl font-digital my-2 text-white">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t2_s1', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t2_s1', 1)" class="flex-[2] bg-blue-600 py-1 rounded">+</button></div>
                            </div>
                            <div class="text-slate-800 font-black italic">VS</div>
                            <div class="flex-1">
                                <p id="t2_p2" class="text-[10px] font-black text-red-400 uppercase truncate">Player 2</p>
                                <div id="t2_s2" class="text-6xl font-digital my-2 text-white">0</div>
                                <div class="flex gap-1"><button onclick="adjustScore('t2_s2', -1)" class="flex-1 bg-white/5 py-1 rounded">-</button><button onclick="adjustScore('t2_s2', 1)" class="flex-[2] bg-red-600 py-1 rounded">+</button></div>
                            </div>
                        </div>
                        <button onclick="saveMatchOnline(2)" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-emerald-900/20">Simpan Pertandingan</button>
                    </div>
                </div>

                <div id="share-area" class="p-6 glass rounded-3xl border border-white/10 shadow-2xl">
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                        <h2 class="text-xs font-black text-yellow-500 uppercase tracking-widest">🏆 Leaderboard (1 Poin/Win)</h2>
                        <button onclick="downloadKlasemen()" class="text-[8px] bg-white/5 px-4 py-2 rounded-full border border-white/10 uppercase font-black">Share JPG</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead class="text-slate-500 uppercase text-[8px]">
                                <tr><th class="p-4">Rank</th><th class="p-4">Nama</th><th class="p-4 text-center">P</th><th class="p-4 text-center">W</th><th class="p-4 text-center text-yellow-500">PTS</th></tr>
                            </thead>
                            <tbody id="rankTable" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass rounded-3xl overflow-hidden border border-white/5">
                    <div class="p-4 bg-white/5 border-b border-white/5 font-black text-blue-400 text-[9px] uppercase tracking-widest">Riwayat & Koreksi</div>
                    <div id="historyList" class="p-4 space-y-2 max-h-60 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. GANTI INI DENGAN URL FIREBASE ANDA
        const firebaseConfig = { databaseURL: "https://appturnamen-51b2e-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let local_players = [];
        let local_history = [];
        let currentTargetTable = 1;
        let selectedP1 = null;

        // Sync Data
        db.ref('tournament_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                local_players = data.players || [];
                local_history = data.history || [];
                renderAll();
            }
        });

        // Add Player
        function addPlayerOnline() {
            const input = document.getElementById('pName');
            const name = input.value.trim().toUpperCase();
            if(!name || local_players.find(p => p.name === name)) return;
            local_players.push({ name, p:0, w:0, l:0, pts:0 });
            db.ref('tournament_data/players').set(local_players);
            input.value = "";
        }

        function adjustScore(id, val) {
            const el = document.getElementById(id);
            let score = parseInt(el.innerText) + val;
            el.innerText = score < 0 ? 0 : score;
        }

        // --- SISTEM ACAK CERDAS (ANTI-URUTAN & ANTI-PEMAIN SEBELUMNYA) ---
        function shuffleByTable(table) {
            let other = table === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];
            let lastMatch = local_history.length > 0 ? local_history[0] : null;
            let recentlyPlayed = lastMatch ? [lastMatch.p1, lastMatch.p2] : [];

            let allPairs = [];
            for(let i=0; i<local_players.length; i++) {
                for(let j=i+1; j<local_players.length; j++) {
                    let n1 = local_players[i].name, n2 = local_players[j].name;
                    if(busy.includes(n1) || busy.includes(n2)) continue;
                    let played = local_history.some(h => (h.p1===n1 && h.p2===n2) || (h.p1===n2 && h.p2===n1));
                    if(played) continue;

                    allPairs.push({
                        pair: [local_players[i], local_players[j]],
                        isFresh: !recentlyPlayed.includes(n1) && !recentlyPlayed.includes(n2)
                    });
                }
            }

            if(allPairs.length === 0) return alert("Semua pasangan sudah bertanding!");

            // Fisher-Yates Shuffle (True Random)
            for (let i = allPairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allPairs[i], allPairs[j]] = [allPairs[j], allPairs[i]];
            }

            // Cari yang istirahat dulu, jika sisa sedikit baru panggil yang baru main
            let chosen = (allPairs.find(p => p.isFresh) || allPairs[0]).pair;
            
            document.getElementById(`t${table}_p1`).innerText = chosen[0].name;
            document.getElementById(`t${table}_p2`).innerText = chosen[1].name;
            document.getElementById(`t${table}_s1`).innerText = "0";
            document.getElementById(`t${table}_s2`).innerText = "0";
            document.getElementById(`card_t${table}`).classList.add('active-table');
            setTimeout(() => document.getElementById(`card_t${table}`).classList.remove('active-table'), 1500);
        }

        // --- SISTEM PILIH MANUAL ---
        function openManualSelect(table) {
            currentTargetTable = table;
            selectedP1 = null;
            renderModalPlayers();
            document.getElementById('playerModal').style.display = 'flex';
        }

        function renderModalPlayers() {
            const list = document.getElementById('modalPlayerList');
            let other = currentTargetTable === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];

            list.innerHTML = local_players.filter(p => !busy.includes(p.name)).map(p => `
                <button onclick="selectPlayer('${p.name}')" class="w-full p-4 bg-white/5 rounded-xl text-left hover:bg-yellow-500 hover:text-black transition flex justify-between items-center mb-1">
                    <span class="font-black uppercase">${p.name}</span>
                    <span class="text-[8px] opacity-60">PTS: ${p.pts}</span>
                </button>
            `).join('');
        }

        function selectPlayer(name) {
            if(!selectedP1) {
                selectedP1 = name;
                document.querySelector('#playerModal h3').innerText = "Lawan untuk " + name + "?";
                renderModalPlayers();
                const btns = document.querySelectorAll('#modalPlayerList button');
                btns.forEach(b => { if(b.innerText.includes(name)) b.style.display = 'none'; });
            } else {
                document.getElementById(`t${currentTargetTable}_p1`).innerText = selectedP1;
                document.getElementById(`t${currentTargetTable}_p2`).innerText = name;
                document.getElementById(`t${currentTargetTable}_s1`).innerText = "0";
                document.getElementById(`t${currentTargetTable}_s2`).innerText = "0";
                closeModal();
            }
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
            document.querySelector('#playerModal h3').innerText = "Pilih Pemain Manual";
        }

        // --- SAVE & DELETE (KOREKSI) ---
        function saveMatchOnline(table) {
            const p1n = document.getElementById(`t${table}_p1`).innerText;
            const p2n = document.getElementById(`t${table}_p2`).innerText;
            const s1 = parseInt(document.getElementById(`t${table}_s1`).innerText);
            const s2 = parseInt(document.getElementById(`t${table}_s2`).innerText);
            if(p1n.includes("PLAYER") || s1 === s2) return alert("Cek skor/pemain!");

            let p1 = local_players.find(p => p.name === p1n);
            let p2 = local_players.find(p => p.name === p2n);

            p1.p++; p2.p++;
            if(s1 > s2) { p1.w++; p1.pts += 1; p2.l++; } 
            else { p2.w++; p2.pts += 1; p1.l++; }

            local_history.unshift({ id: Date.now(), p1: p1n, p2: p2n, s1, s2 });
            db.ref('tournament_data').update({ players: local_players, history: local_history });

            // Reset UI Meja
            document.getElementById(`t${table}_p1`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_p2`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_s1`).innerText = "0"; document.getElementById(`t${table}_s2`).innerText = "0";
        }

        function deleteMatch(id) {
            if(!confirm("Hapus & Kembalikan Poin?")) return;
            const match = local_history.find(h => h.id === id);
            let p1 = local_players.find(p => p.name === match.p1);
            let p2 = local_players.find(p => p.name === match.p2);

            p1.p--; p2.p--;
            if(match.s1 > match.s2) { p1.w--; p1.pts -= 1; p2.l--; }
            else { p2.w--; p2.pts -= 1; p1.l--; }

            const newHist = local_history.filter(h => h.id !== id);
            db.ref('tournament_data').update({ players: local_players, history: newHist });
        }

        function renderAll() {
            const sorted = [...local_players].sort((a,b) => b.pts - a.pts || b.w - a.w || a.l - b.l);
            document.getElementById('rankTable').innerHTML = sorted.map((p,i) => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-digital ${i<3?'text-yellow-500':'text-slate-600'}">${i+1}</td>
                    <td class="p-4 font-black uppercase text-white">${p.name}</td>
                    <td class="p-4 text-center text-slate-500">${p.p}</td>
                    <td class="p-4 text-center text-emerald-500 font-bold">${p.w}</td>
                    <td class="p-4 text-center font-digital text-yellow-500 text-lg">${p.pts}</td>
                </tr>
            `).join('');

            document.getElementById('playerList').innerHTML = local_players.map(p => `
                <div class="bg-slate-900/40 p-2 rounded-lg text-[9px] flex justify-between border border-white/5 uppercase">
                    <span>${p.name}</span><span class="text-yellow-500">${p.p} Main</span>
                </div>
            `).join('');

            document.getElementById('historyList').innerHTML = local_history.map(h => `
                <div class="bg-black/20 p-3 rounded-xl border border-white/5 flex justify-between items-center group">
                    <div class="text-[10px] uppercase font-bold">
                        <span class="${h.s1 > h.s2 ? 'text-yellow-500' : ''}">${h.p1}</span>
                        <span class="mx-2 text-slate-700">${h.s1}-${h.s2}</span>
                        <span class="${h.s2 > h.s1 ? 'text-yellow-500' : ''}">${h.p2}</span>
                    </div>
                    <button onclick="deleteMatch(${h.id})" class="text-[8px] bg-rose-600/20 text-rose-500 px-2 py-1 rounded-lg opacity-0 group-hover:opacity-100 transition font-black">HAPUS</button>
                </div>
            `).join('');
        }

        function downloadKlasemen() {
            html2canvas(document.getElementById('share-area'), { backgroundColor: "#05080f", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Klasemen_Billiard.jpg';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function clearAllData() { if(confirm("Hapus seluruh data online?")) db.ref('tournament_data').remove(); }
    </script>
</body>
</html>
