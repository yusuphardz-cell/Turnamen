<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiard Pro - Supabase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05080f; color: white; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .active-table { border: 2px solid #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="playerModal" class="modal p-4"><div class="glass p-6 rounded-3xl w-full max-w-md border border-white/10"><h3 class="font-black text-yellow-500 mb-4 uppercase text-center">Pilih Manual</h3><div id="modalPlayerList" class="grid gap-2 max-h-80 overflow-y-auto"></div><button onclick="closeModal()" class="w-full mt-6 py-3 rounded-xl bg-white/5 font-bold uppercase text-[10px]">Batal</button></div></div>
    <div id="detailModal" class="modal p-4"><div class="glass p-6 rounded-3xl w-full max-w-md border border-white/10"><div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4"><h3 id="detailPlayerName" class="font-black text-yellow-500 uppercase text-lg text-center">Nama</h3><span id="detailPlayerPts" class="bg-yellow-500 text-black px-3 py-1 rounded-full text-[10px] font-bold">0 PTS</span></div><div class="space-y-6"><div><p class="text-[9px] font-black text-emerald-400 uppercase mb-3">✅ Sudah Dilawan</p><div id="playedList" class="space-y-2 max-h-40 overflow-y-auto"></div></div><div><p class="text-[9px] font-black text-rose-400 uppercase mb-3">⏳ Calon Lawan</p><div id="unplayedList" class="grid grid-cols-2 gap-2"></div></div></div><button onclick="closeDetailModal()" class="w-full mt-8 py-4 rounded-xl bg-white/5 font-black uppercase text-[10px]">Tutup</button></div></div>

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center glass p-5 rounded-2xl border border-white/5">
            <div><h1 class="text-xl font-black font-digital text-yellow-500 uppercase">🎱 Billiard Pro</h1><p class="text-[8px] text-slate-500 tracking-[0.4em] font-bold uppercase">Supabase Realtime</p></div>
            <button onclick="clearAllData()" class="text-[10px] bg-rose-600/20 text-rose-500 border border-rose-500/30 px-5 py-2.5 rounded-full font-black uppercase">Reset Liga</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="glass p-5 rounded-2xl border border-white/5">
                    <input type="text" id="pName" placeholder="Nama..." class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl mb-3 outline-none focus:border-yellow-500 text-sm font-bold uppercase">
                    <button onclick="addPlayerOnline()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-xs">Daftarkan</button>
                </div>
                <div class="space-y-3">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-4 rounded-2xl text-center"><p class="text-[9px] font-black text-blue-400 mb-3 uppercase">Meja 1</p><div class="grid grid-cols-2 gap-2"><button onclick="shuffleByTable(1)" class="bg-blue-600 py-3 rounded-xl font-black text-[9px] uppercase">🎲 Acak</button><button onclick="openManualSelect(1)" class="bg-white/5 py-3 rounded-xl font-black text-[9px] uppercase border border-white/5">👤 Pilih</button></div></div>
                    <div class="bg-rose-600/10 border border-rose-500/20 p-4 rounded-2xl text-center"><p class="text-[9px] font-black text-rose-400 mb-3 uppercase">Meja 2</p><div class="grid grid-cols-2 gap-2"><button onclick="shuffleByTable(2)" class="bg-rose-600 py-3 rounded-xl font-black text-[9px] uppercase">🎲 Acak</button><button onclick="openManualSelect(2)" class="bg-white/5 py-3 rounded-xl font-black text-[9px] uppercase border border-white/5">👤 Pilih</button></div></div>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="card_t1" class="glass p-8 rounded-[2.5rem] border border-white/5">
                        <div class="flex justify-between items-center mb-8"><span class="text-[10px] font-black bg-blue-600 px-4 py-1 rounded-full">T1</span><div class="text-[10px] font-digital text-yellow-500">LIVE</div></div>
                        <div class="flex justify-between items-center text-center gap-2 mb-10">
                            <div class="flex-1"><p id="t1_p1" class="text-[11px] font-black text-blue-400 uppercase truncate">P1</p><div id="t1_s1" class="text-7xl font-digital my-4">0</div><div class="flex gap-2"><button onclick="adjustScore('t1_s1', -1)" class="flex-1 bg-white/5 py-2 rounded">-</button><button onclick="adjustScore('t1_s1', 1)" class="flex-[2] bg-blue-600 py-2 rounded">+</button></div></div>
                            <div class="font-black italic text-xl px-2">VS</div>
                            <div class="flex-1"><p id="t1_p2" class="text-[11px] font-black text-red-400 uppercase truncate">P2</p><div id="t1_s2" class="text-7xl font-digital my-4">0</div><div class="flex gap-2"><button onclick="adjustScore('t1_s2', -1)" class="flex-1 bg-white/5 py-2 rounded">-</button><button onclick="adjustScore('t1_s2', 1)" class="flex-[2] bg-red-600 py-2 rounded">+</button></div></div>
                        </div>
                        <button onclick="saveMatchOnline(1)" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-[11px] uppercase">Simpan Pertandingan</button>
                    </div>
                    <div id="card_t2" class="glass p-8 rounded-[2.5rem] border border-white/5">
                        <div class="flex justify-between items-center mb-8"><span class="text-[10px] font-black bg-rose-600 px-4 py-1 rounded-full">T2</span><div class="text-[10px] font-digital text-yellow-500">LIVE</div></div>
                        <div class="flex justify-between items-center text-center gap-2 mb-10">
                            <div class="flex-1"><p id="t2_p1" class="text-[11px] font-black text-blue-400 uppercase truncate">P1</p><div id="t2_s1" class="text-7xl font-digital my-4">0</div><div class="flex gap-2"><button onclick="adjustScore('t2_s1', -1)" class="flex-1 bg-white/5 py-2 rounded">-</button><button onclick="adjustScore('t2_s1', 1)" class="flex-[2] bg-blue-600 py-2 rounded">+</button></div></div>
                            <div class="font-black italic text-xl px-2">VS</div>
                            <div class="flex-1"><p id="t2_p2" class="text-[11px] font-black text-red-400 uppercase truncate">P2</p><div id="t2_s2" class="text-7xl font-digital my-4">0</div><div class="flex gap-2"><button onclick="adjustScore('t2_s2', -1)" class="flex-1 bg-white/5 py-2 rounded">-</button><button onclick="adjustScore('t2_s2', 1)" class="flex-[2] bg-red-600 py-2 rounded">+</button></div></div>
                        </div>
                        <button onclick="saveMatchOnline(2)" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-[11px] uppercase">Simpan Pertandingan</button>
                    </div>
                </div>

                <div id="share-area" class="p-8 glass rounded-[2.5rem] border border-white/10">
                    <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6"><div><h2 class="text-sm font-black text-yellow-500 uppercase">🏆 Klasemen</h2></div><button onclick="downloadKlasemen()" class="text-[9px] bg-white/10 px-5 py-2 rounded-full uppercase font-black">Download JPG</button></div>
                    <table class="w-full text-left text-[12px]"><thead class="text-slate-500 uppercase text-[9px] font-black"><tr><th class="p-4">Rank</th><th class="p-4">Nama</th><th class="p-4 text-center">P</th><th class="p-4 text-center">W</th><th class="p-4 text-center text-yellow-500">PTS</th></tr></thead><tbody id="rankTable" class="divide-y divide-white/5"></tbody></table>
                </div>

                <div class="glass rounded-3xl border border-white/5 p-5"><p class="text-[10px] font-black text-blue-400 mb-4 uppercase">Riwayat Terakhir</p><div id="historyList" class="space-y-3 max-h-72 overflow-y-auto"></div></div>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIG (GANTI DENGAN PUNYA ANDA)
        const SUPABASE_URL = "https://xdgjjsdvrcqwwlmrxcpm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_YZJzjRUCsHqcE5jyl6a8Ww_DSb9xXDQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let local_players = [];
        let local_history = [];
        let currentTargetTable = 1;
        let selectedP1 = null;

        // 2. DATA SYNC
        async function loadData() {
            const { data: p } = await _supabase.from('players').select('*');
            const { data: h } = await _supabase.from('history').select('*').order('created_at', { ascending: false });
            local_players = p || [];
            local_history = h || [];
            renderAll();
        }

        function subscribeRealtime() {
            _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'history' }, loadData).subscribe();
        }

        async function addPlayerOnline() {
            const name = document.getElementById('pName').value.trim().toUpperCase();
            if(!name || local_players.find(p => p.name === name)) return;
            await _supabase.from('players').insert([{ name, p:0, w:0, l:0, pts:0 }]);
            document.getElementById('pName').value = "";
        }

        async function saveMatchOnline(table) {
            const p1n = document.getElementById(`t${table}_p1`).innerText;
            const p2n = document.getElementById(`t${table}_p2`).innerText;
            const s1 = parseInt(document.getElementById(`t${table}_s1`).innerText);
            const s2 = parseInt(document.getElementById(`t${table}_s2`).innerText);
            if(p1n.includes("PLAYER") || s1 === s2) return alert("Cek data!");

            let p1 = local_players.find(p => p.name === p1n);
            let p2 = local_players.find(p => p.name === p2n);

            const upd1 = { p: p1.p+1, w: s1>s2?p1.w+1:p1.w, l: s1<s2?p1.l+1:p1.l, pts: s1>s2?p1.pts+1:p1.pts };
            const upd2 = { p: p2.p+1, w: s2>s1?p2.w+1:p2.w, l: s2<s1?p2.l+1:p2.l, pts: s2>s1?p2.pts+1:p2.pts };

            await _supabase.from('history').insert([{ p1: p1n, p2: p2n, s1, s2 }]);
            await _supabase.from('players').update(upd1).eq('name', p1n);
            await _supabase.from('players').update(upd2).eq('name', p2n);

            document.getElementById(`t${table}_p1`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_p2`).innerText = "PLAYER " + table;
        }

        async function deleteMatch(id) {
            if(!confirm("Hapus?")) return;
            const m = local_history.find(h => h.id === id);
            let p1 = local_players.find(p => p.name === m.p1);
            let p2 = local_players.find(p => p.name === m.p2);

            const upd1 = { p: p1.p-1, w: m.s1>m.s2?p1.w-1:p1.w, l: m.s1<m.s2?p1.l-1:p1.l, pts: m.s1>m.s2?p1.pts-1:p1.pts };
            const upd2 = { p: p2.p-1, w: m.s2>m.s1?p2.w-1:p2.w, l: m.s2<m.s1?p2.l-1:p2.l, pts: m.s2>m.s1?p2.pts-1:p2.pts };

            await _supabase.from('history').delete().eq('id', id);
            await _supabase.from('players').update(upd1).eq('name', m.p1);
            await _supabase.from('players').update(upd2).eq('name', m.p2);
        }

        // --- RENDER & LOGIC (Sama seperti versi sebelumnya) ---
        function shuffleByTable(table) {
            let other = table === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];
            let last = local_history[0] ? [local_history[0].p1, local_history[0].p2] : [];
            let pairs = [];
            for(let i=0; i<local_players.length; i++) {
                for(let j=i+1; j<local_players.length; j++) {
                    let n1 = local_players[i].name, n2 = local_players[j].name;
                    if(busy.includes(n1) || busy.includes(n2)) continue;
                    if(local_history.some(h => (h.p1===n1&&h.p2===n2)||(h.p1===n2&&h.p2===n1))) continue;
                    pairs.push({ p: [n1, n2], fresh: !last.includes(n1) && !last.includes(n2) });
                }
            }
            if(!pairs.length) return alert("Habis!");
            pairs.sort(() => Math.random() - 0.5);
            let chosen = (pairs.find(p => p.fresh) || pairs[0]).p;
            document.getElementById(`t${table}_p1`).innerText = chosen[0];
            document.getElementById(`t${table}_p2`).innerText = chosen[1];
            document.getElementById(`t${table}_s1`).innerText = "0";
            document.getElementById(`t${table}_s2`).innerText = "0";
        }

        function renderAll() {
            const sorted = [...local_players].sort((a,b) => b.pts - a.pts || b.w - a.w || a.l - b.l);
            document.getElementById('rankTable').innerHTML = sorted.map((p,i) => `
                <tr class="border-b border-white/5 cursor-pointer" onclick="showPlayerDetail('${p.name}')">
                    <td class="p-4 font-digital ${i<3?'text-yellow-500':'text-slate-600'}">${i+1}</td>
                    <td class="p-4 font-black uppercase text-white">${p.name}</td>
                    <td class="p-4 text-center text-slate-500">${p.p}</td>
                    <td class="p-4 text-center text-emerald-500 font-bold">${p.w}</td>
                    <td class="p-4 text-center font-digital text-yellow-500 text-lg">${p.pts}</td>
                </tr>
            `).join('');
            document.getElementById('historyList').innerHTML = local_history.map(h => `
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 flex justify-between items-center group">
                    <span class="text-[10px] uppercase font-bold text-slate-300">${h.p1} <span class="mx-2 text-yellow-500 font-digital">${h.s1}-${h.s2}</span> ${h.p2}</span>
                    <button onclick="deleteMatch(${h.id})" class="text-[8px] bg-rose-600/20 text-rose-500 px-3 py-1.5 rounded-xl opacity-0 group-hover:opacity-100 font-black">HAPUS</button>
                </div>
            `).join('');
        }

        function showPlayerDetail(n) {
            const p = local_players.find(x => x.name === n);
            document.getElementById('detailPlayerName').innerText = n;
            document.getElementById('detailPlayerPts').innerText = p.pts + " PTS";
            let pl = []; local_history.forEach(h => {
                if(h.p1===n) pl.push({o:h.p2, s:`${h.s1}-${h.s2}`, w:h.s1>h.s2});
                if(h.p2===n) pl.push({o:h.p1, s:`${h.s2}-${h.s1}`, w:h.s2>h.s1});
            });
            document.getElementById('playedList').innerHTML = pl.map(m => `<div class="flex justify-between bg-white/5 p-3 rounded-xl"><span>${m.o}</span><span class="${m.w?'text-emerald-400':'text-rose-500'}">${m.s}</span></div>`).join('');
            const upl = local_players.filter(x => x.name !== n && !pl.map(z=>z.o).includes(x.name));
            document.getElementById('unplayedList').innerHTML = upl.map(u => `<div class="bg-white/5 p-2 rounded text-[9px] text-center">${u.name}</div>`).join('');
            document.getElementById('detailModal').style.display = 'flex';
        }

        function adjustScore(id, v) { let e = document.getElementById(id); e.innerText = Math.max(0, parseInt(e.innerText) + v); }
        function closeModal() { document.getElementById('playerModal').style.display = 'none'; }
        function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; }
        async function clearAllData() { if(confirm("Hapus Semua?")) { await _supabase.from('history').delete().neq('id', 0); await _supabase.from('players').delete().neq('name', ''); location.reload(); } }
        function downloadKlasemen() { html2canvas(document.getElementById('share-area'), { backgroundColor: "#05080f" }).then(c => { let l = document.createElement('a'); l.download = 'standings.jpg'; l.href = c.toDataURL(); l.click(); }); }
        
        loadData();
        subscribeRealtime();
    </script>
</body>
</html>
