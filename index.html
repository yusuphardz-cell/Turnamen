<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiard Pro - Supabase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05080f; color: white; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .active-table { border: 2px solid #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6">

    <div id="playerModal" class="modal flex items-center justify-center" style="display: none; z-index: 9999;">
    <div class="glass p-6 rounded-3xl w-full max-w-md border border-white/10 shadow-2xl mx-4">
        <h3 id="modalTitle" class="font-black text-yellow-500 mb-6 uppercase text-center tracking-widest text-sm">Pilih Pemain</h3>
        
        <div id="modalPlayerList" class="space-y-2 max-h-80 overflow-y-auto pr-2 custom-scroll">
            </div>
        
        <button onclick="closeModal()" class="w-full mt-6 py-4 rounded-2xl bg-white/5 font-black uppercase text-[10px] border border-white/10 hover:bg-rose-600/20 hover:text-rose-500 transition">
            Batal / Tutup
        </button>
    </div>
</div>

    <script>
        // 1. CONFIG (GANTI DENGAN PUNYA ANDA)
        const SUPABASE_URL = "https://xdgjjsdvrcqwwlmrxcpm.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ2pqc2R2cmNxd3dsbXJ4Y3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk4MjAsImV4cCI6MjA5MDQwNTgyMH0.4dPYAZRrdd4RyPT4UU-jcpGglIr65Av9eUvKwLWOqKs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let local_players = [];
        let local_history = [];
        let currentTargetTable = 1;
        let selectedP1 = null;

        // 2. DATA SYNC
        async function loadData() {
            const { data: p } = await _supabase.from('players').select('*');
            const { data: h } = await _supabase.from('history').select('*').order('created_at', { ascending: false });
            local_players = p || [];
            local_history = h || [];
            renderAll();
        }

        function subscribeRealtime() {
            _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'history' }, loadData).subscribe();
        }

        async function addPlayerOnline() {
            const name = document.getElementById('pName').value.trim().toUpperCase();
            if(!name || local_players.find(p => p.name === name)) return;
            await _supabase.from('players').insert([{ name, p:0, w:0, l:0, pts:0 }]);
            document.getElementById('pName').value = "";
        }

        async function saveMatchOnline(table) {
            const p1n = document.getElementById(`t${table}_p1`).innerText;
            const p2n = document.getElementById(`t${table}_p2`).innerText;
            const s1 = parseInt(document.getElementById(`t${table}_s1`).innerText);
            const s2 = parseInt(document.getElementById(`t${table}_s2`).innerText);
            if(p1n.includes("PLAYER") || s1 === s2) return alert("Cek data!");

            let p1 = local_players.find(p => p.name === p1n);
            let p2 = local_players.find(p => p.name === p2n);

            const upd1 = { p: p1.p+1, w: s1>s2?p1.w+1:p1.w, l: s1<s2?p1.l+1:p1.l, pts: s1>s2?p1.pts+1:p1.pts };
            const upd2 = { p: p2.p+1, w: s2>s1?p2.w+1:p2.w, l: s2<s1?p2.l+1:p2.l, pts: s2>s1?p2.pts+1:p2.pts };

            await _supabase.from('history').insert([{ p1: p1n, p2: p2n, s1, s2 }]);
            await _supabase.from('players').update(upd1).eq('name', p1n);
            await _supabase.from('players').update(upd2).eq('name', p2n);

            document.getElementById(`t${table}_p1`).innerText = "PLAYER " + table;
            document.getElementById(`t${table}_p2`).innerText = "PLAYER " + table;
        }

        async function deleteMatch(id) {
            if(!confirm("Hapus?")) return;
            const m = local_history.find(h => h.id === id);
            let p1 = local_players.find(p => p.name === m.p1);
            let p2 = local_players.find(p => p.name === m.p2);

            const upd1 = { p: p1.p-1, w: m.s1>m.s2?p1.w-1:p1.w, l: m.s1<m.s2?p1.l-1:p1.l, pts: m.s1>m.s2?p1.pts-1:p1.pts };
            const upd2 = { p: p2.p-1, w: m.s2>m.s1?p2.w-1:p2.w, l: m.s2<m.s1?p2.l-1:p2.l, pts: m.s2>m.s1?p2.pts-1:p2.pts };

            await _supabase.from('history').delete().eq('id', id);
            await _supabase.from('players').update(upd1).eq('name', m.p1);
            await _supabase.from('players').update(upd2).eq('name', m.p2);
        }

        // --- RENDER & LOGIC (Sama seperti versi sebelumnya) ---
        function shuffleByTable(table) {
            let other = table === 1 ? 2 : 1;
            let busy = [document.getElementById(`t${other}_p1`).innerText, document.getElementById(`t${other}_p2`).innerText];
            let last = local_history[0] ? [local_history[0].p1, local_history[0].p2] : [];
            let pairs = [];
            for(let i=0; i<local_players.length; i++) {
                for(let j=i+1; j<local_players.length; j++) {
                    let n1 = local_players[i].name, n2 = local_players[j].name;
                    if(busy.includes(n1) || busy.includes(n2)) continue;
                    if(local_history.some(h => (h.p1===n1&&h.p2===n2)||(h.p1===n2&&h.p2===n1))) continue;
                    pairs.push({ p: [n1, n2], fresh: !last.includes(n1) && !last.includes(n2) });
                }
            }
            if(!pairs.length) return alert("Habis!");
            pairs.sort(() => Math.random() - 0.5);
            let chosen = (pairs.find(p => p.fresh) || pairs[0]).p;
            document.getElementById(`t${table}_p1`).innerText = chosen[0];
            document.getElementById(`t${table}_p2`).innerText = chosen[1];
            document.getElementById(`t${table}_s1`).innerText = "0";
            document.getElementById(`t${table}_s2`).innerText = "0";
        }

        function renderAll() {
            const sorted = [...local_players].sort((a,b) => b.pts - a.pts || b.w - a.w || a.l - b.l);
            document.getElementById('rankTable').innerHTML = sorted.map((p,i) => `
                <tr class="border-b border-white/5 cursor-pointer" onclick="showPlayerDetail('${p.name}')">
                    <td class="p-4 font-digital ${i<3?'text-yellow-500':'text-slate-600'}">${i+1}</td>
                    <td class="p-4 font-black uppercase text-white">${p.name}</td>
                    <td class="p-4 text-center text-slate-500">${p.p}</td>
                    <td class="p-4 text-center text-emerald-500 font-bold">${p.w}</td>
                    <td class="p-4 text-center font-digital text-yellow-500 text-lg">${p.pts}</td>
                </tr>
            `).join('');
            document.getElementById('historyList').innerHTML = local_history.map(h => `
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 flex justify-between items-center group">
                    <span class="text-[10px] uppercase font-bold text-slate-300">${h.p1} <span class="mx-2 text-yellow-500 font-digital">${h.s1}-${h.s2}</span> ${h.p2}</span>
                    <button onclick="deleteMatch(${h.id})" class="text-[8px] bg-rose-600/20 text-rose-500 px-3 py-1.5 rounded-xl opacity-0 group-hover:opacity-100 font-black">HAPUS</button>
                </div>
            `).join('');
        }

        function showPlayerDetail(n) {
            const p = local_players.find(x => x.name === n);
            document.getElementById('detailPlayerName').innerText = n;
            document.getElementById('detailPlayerPts').innerText = p.pts + " PTS";
            let pl = []; local_history.forEach(h => {
                if(h.p1===n) pl.push({o:h.p2, s:`${h.s1}-${h.s2}`, w:h.s1>h.s2});
                if(h.p2===n) pl.push({o:h.p1, s:`${h.s2}-${h.s1}`, w:h.s2>h.s1});
            });
            document.getElementById('playedList').innerHTML = pl.map(m => `<div class="flex justify-between bg-white/5 p-3 rounded-xl"><span>${m.o}</span><span class="${m.w?'text-emerald-400':'text-rose-500'}">${m.s}</span></div>`).join('');
            const upl = local_players.filter(x => x.name !== n && !pl.map(z=>z.o).includes(x.name));
            document.getElementById('unplayedList').innerHTML = upl.map(u => `<div class="bg-white/5 p-2 rounded text-[9px] text-center">${u.name}</div>`).join('');
            document.getElementById('detailModal').style.display = 'flex';
        }

        function adjustScore(id, v) { let e = document.getElementById(id); e.innerText = Math.max(0, parseInt(e.innerText) + v); }
        function closeModal() { document.getElementById('playerModal').style.display = 'none'; }
        function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; }
        async function clearAllData() { if(confirm("Hapus Semua?")) { await _supabase.from('history').delete().neq('id', 0); await _supabase.from('players').delete().neq('name', ''); location.reload(); } }
        function downloadKlasemen() { html2canvas(document.getElementById('share-area'), { backgroundColor: "#05080f" }).then(c => { let l = document.createElement('a'); l.download = 'standings.jpg'; l.href = c.toDataURL(); l.click(); }); }
        
        loadData();
        subscribeRealtime();
    </script>
</body>
</html>
